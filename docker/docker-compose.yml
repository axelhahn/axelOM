networks:
  addons-network:

services:

  # ----- apache httpd + php
  addons-web-server:
    build:
      context: .
      dockerfile: ./containers/web-server/Dockerfile
    image: "php:8.5-apache"
    container_name: 'addons-server'
    ports:
      - '${APP_PORT}:80'

    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 500M
        # reservations:
        #   cpus: '0.01'
        #   memory: 20M

    working_dir: ${WEBROOT}
    
    volumes:
      - ../:/var/www/${APP_NAME}
      - ./containers/web-server/apache/sites-enabled:/etc/apache2/sites-enabled
      - ./containers/web-server/php/extra-php-config.ini:/usr/local/etc/php/conf.d/extra-php-config.ini
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 3s
      retries: 5
      # start_period: 40s

    networks:
      - addons-network

    user: ${DOCKER_USER_UID}

